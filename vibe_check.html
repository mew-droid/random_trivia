<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vibe check ✦ a soft landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #08060F;
    --bg: #15111F;
    --bg-2: #1D1730;
    --surface: #221B36;
    --surface-2: #2E2545;
    --line: #3C3154;
    --accent: #D4B5FF;
    --accent-soft: #A68FD9;
    --rose: #FFB8D1;
    --rose-deep: #E88FB3;
    --gold: #E8C547;
    --mint: #A8E6CF;
    --coral: #FF9AA2;
    --muted: #8C84A3;
    --text: #EDE6F5;
    --text-dim: #C4BAD6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    font-family: 'Inter Tight', sans-serif;
    color: var(--text);
    background: var(--bg);
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.08;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");
    mix-blend-mode: screen;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(212, 181, 255, 0.12) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 85%, rgba(255, 184, 209, 0.08) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 50%, rgba(232, 197, 71, 0.04) 0%, transparent 60%);
  }

  #app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    padding: 20px 24px 100px;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ---------- TOP BAR ---------- */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0 28px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }

  .brand {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    font-style: italic;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .brand .dot {
    color: var(--rose);
    font-size: 14px;
    margin: 0 4px;
    vertical-align: middle;
  }

  .status-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 11px;
    letter-spacing: 0.05em;
    text-transform: lowercase;
  }

  /* ---------- HOME HERO ---------- */
  .home-hero {
    padding: 32px 0 40px;
    text-align: left;
  }

  .hero-kicker {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent-soft);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .hero-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(42px, 8vw, 68px);
    line-height: 0.95;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .hero-title em {
    font-style: italic;
    color: var(--rose);
  }

  .hero-title .accent {
    color: var(--accent);
    font-style: italic;
  }

  .hero-sub {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 440px;
    line-height: 1.55;
    margin-bottom: 8px;
  }

  .hero-note {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  /* ---------- MODE GRID ---------- */
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 36px;
  }

  @media (max-width: 520px) {
    .mode-grid { grid-template-columns: 1fr; }
  }

  .mode-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 20px 20px;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease, border 0.2s ease;
    position: relative;
    overflow: hidden;
    min-height: 148px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .mode-card:hover {
    transform: translateY(-2px);
    background: var(--surface-2);
    border-color: var(--accent-soft);
  }

  .mode-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle at top right, rgba(212, 181, 255, 0.15), transparent 70%);
    pointer-events: none;
  }

  .mode-card.rose::before {
    background: radial-gradient(circle at top right, rgba(255, 184, 209, 0.18), transparent 70%);
  }

  .mode-card.gold::before {
    background: radial-gradient(circle at top right, rgba(232, 197, 71, 0.15), transparent 70%);
  }

  .mode-card.mint::before {
    background: radial-gradient(circle at top right, rgba(168, 230, 207, 0.15), transparent 70%);
  }

  .mode-card.coral::before {
    background: radial-gradient(circle at top right, rgba(255, 154, 162, 0.16), transparent 70%);
  }

  .mode-kicker {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .mode-title {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-style: italic;
    line-height: 1;
    margin-bottom: 6px;
    color: var(--text);
  }

  .mode-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
  }

  /* ---------- SECTION HEADER (in modes) ---------- */
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }

  .back-link {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent-soft);
    cursor: pointer;
    letter-spacing: 0.05em;
    background: none;
    border: none;
    padding: 6px 10px 6px 0;
  }

  .back-link:hover { color: var(--accent); }

  .section-kicker {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: lowercase;
  }

  /* ---------- CARD / SWIPE UI ---------- */
  .card-stack {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 36px 28px 28px;
    min-height: 400px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }

  .card-stack::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 181, 255, 0.3), transparent);
  }

  .card-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent-soft);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .card-prompt {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(26px, 5vw, 34px);
    line-height: 1.15;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 20px;
  }

  .card-prompt em {
    font-style: italic;
    color: var(--rose);
  }

  .card-answer {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.6;
    padding: 16px 18px;
    background: rgba(212, 181, 255, 0.06);
    border-left: 2px solid var(--accent-soft);
    border-radius: 0 12px 12px 0;
    margin-top: 12px;
  }

  .card-answer .answer-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .card-answer strong {
    color: var(--text);
    font-weight: 500;
  }

  .card-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  /* ---------- BUTTONS ---------- */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Inter Tight', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 11px 20px;
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    transition: all 0.15s ease;
    letter-spacing: 0.01em;
  }

  .btn:hover {
    background: var(--surface-2);
    border-color: var(--accent-soft);
  }

  .btn-primary {
    background: var(--accent);
    color: var(--ink);
    border-color: var(--accent);
    font-weight: 600;
  }

  .btn-primary:hover {
    background: var(--rose);
    border-color: var(--rose);
  }

  .btn-ghost {
    border-color: transparent;
    color: var(--muted);
    padding: 11px 12px;
  }

  .btn-ghost:hover {
    color: var(--text-dim);
    background: transparent;
  }

  /* ---------- QUIZ OPTIONS ---------- */
  .opt-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 24px;
  }

  .opt {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-family: 'Inter Tight', sans-serif;
    transition: all 0.15s ease;
    line-height: 1.4;
  }

  .opt:hover {
    background: var(--surface-2);
    border-color: var(--accent-soft);
    transform: translateX(3px);
  }

  .opt-letter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent-soft);
    letter-spacing: 0.1em;
    margin-right: 10px;
  }

  /* ---------- PROGRESS ---------- */
  .progress-track {
    height: 2px;
    background: var(--line);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--rose));
    transition: width 0.4s ease;
  }

  /* ---------- RESULT ---------- */
  .result-hero {
    text-align: center;
    padding: 20px 0 28px;
  }

  .result-kicker {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent-soft);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .result-name {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(40px, 9vw, 64px);
    line-height: 1;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--rose);
    font-style: italic;
    margin-bottom: 16px;
  }

  .result-desc {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.65;
    max-width: 440px;
    margin: 0 auto;
  }

  /* ---------- WEEKEND SORTER ---------- */
  .sorter-q {
    font-family: 'Instrument Serif', serif;
    font-size: 30px;
    line-height: 1.15;
    margin-bottom: 8px;
    color: var(--text);
  }

  .sorter-q em {
    font-style: italic;
    color: var(--rose);
  }

  .sorter-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 22px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .sorter-result {
    margin-top: 8px;
  }

  .result-card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 12px;
    position: relative;
  }

  .result-card.top {
    border-color: var(--rose-deep);
    background: linear-gradient(135deg, rgba(255, 184, 209, 0.08), rgba(212, 181, 255, 0.05));
  }

  .result-rank {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent-soft);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .result-card.top .result-rank {
    color: var(--rose);
  }

  .result-title {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 6px;
  }

  .result-why {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.55;
  }

  /* ---------- HELPERS ---------- */
  .hidden { display: none !important; }

  .fade-in {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .divider {
    height: 1px;
    background: var(--line);
    margin: 32px 0;
  }

  /* ---------- FOOTER ---------- */
  .foot {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }

  .foot em {
    color: var(--accent-soft);
    font-style: italic;
    font-family: 'Instrument Serif', serif;
    font-size: 13px;
  }

</style>
</head>
<body>

<div id="app"></div>

<script>
  // =============================================================

            <div class="mode-desc">real things that sound fake. pull one at a time. save your favourites in your head.</div>
          </div>
        </div>

        <div class="mode-card" onclick="openQuiz('katseye')">
          <div>
            <div class="mode-kicker">quiz 01</div>
            <div class="mode-title">which katseye</div>
            <div class="mode-desc">manon, megan, lara, sophia, daniela or yoonchae. six questions. one verdict.</div>
          </div>
        </div>

        <div class="mode-card rose" onclick="openQuiz('blackpink')">
          <div>
            <div class="mode-kicker">quiz 02</div>
            <div class="mode-title">which blackpink</div>
            <div class="mode-desc">jisoo, jennie, rosé or lisa. honest answers only. takes about two minutes.</div>
          </div>
        </div>

        <div class="mode-card mint" onclick="openQuiz('billie')">
          <div>
            <div class="mode-kicker">quiz 03</div>
            <div class="mode-title">billie eilish mood</div>
            <div class="mode-desc">what song you actually are today. not a vibe forever. a vibe right now.</div>
          </div>
        </div>

        <div class="mode-card" onclick="openQuiz('friend')">
          <div>
            <div class="mode-kicker">quiz 04</div>
            <div class="mode-title">friendship type</div>
            <div class="mode-desc">how you actually show up for your people. slightly more serious. kind of illuminating.</div>
          </div>
        </div>

        <div class="mode-card coral" onclick="openSorter()" style="grid-column: 1 / -1;">
          <div>
            <div class="mode-kicker">decision engine</div>
            <div class="mode-title">weekend sorter</div>
            <div class="mode-desc">six questions. three tailored suggestions for what to do this weekend. ranked.</div>
          </div>
        </div>
      </div>

      <div class="foot">
        made with <em>care</em> . no ads . no tracking . close whenever
      </div>
    `;
  }

  // =============================================================
  // RENDER: RIDDLES
  // =============================================================
  function renderRiddles() {
    const r = state.modeData[state.currentIdx];
    return `
      <div class="topbar">
        <div class="brand">vibe <span class="dot">✦</span> check</div>
        <button class="back-link" onclick="goHome()">← back</button>
      </div>

      <div class="section-head">
        <div class="section-kicker">riddle ${state.currentIdx + 1} of ${state.modeData.length}</div>
        <div class="section-kicker">tap to reveal</div>
      </div>

      <div class="card-stack fade-in">
        <div>
          <div class="card-tag">riddle</div>
          <div class="card-prompt">${r.q}</div>
          <div id="answer-box" class="hidden">
            <div class="card-answer">
              <span class="answer-label">answer</span>
              ${r.a}
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="toggleAnswer()">reveal</button>
          <button class="btn" onclick="nextItem()">next →</button>
          <button class="btn-ghost btn" onclick="shuffleStack()">shuffle</button>
        </div>
      </div>
    `;
  }

  // =============================================================
  // RENDER: FACTS
  // =============================================================
  function renderFacts() {
    const f = state.modeData[state.currentIdx];
    return `
      <div class="topbar">
        <div class="brand">vibe <span class="dot">✦</span> check</div>
        <button class="back-link" onclick="goHome()">← back</button>
      </div>

      <div class="section-head">
        <div class="section-kicker">fact ${state.currentIdx + 1} of ${state.modeData.length}</div>
        <div class="section-kicker">${f.t}</div>
      </div>

      <div class="card-stack fade-in">
        <div>
          <div class="card-tag">did you know</div>
          <div class="card-prompt">${f.f}</div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="nextItem()">next fact →</button>
          <button class="btn-ghost btn" onclick="shuffleStack()">shuffle</button>
          <button class="btn-ghost btn" onclick="goHome()">done</button>
        </div>
      </div>
    `;
  }

  // =============================================================
  // RENDER: QUIZ QUESTION
  // =============================================================
  function renderQuizQuestion() {
    const quiz = state.modeData;
    const idx = state.currentIdx;
    const q = quiz.questions[idx];
    const total = quiz.questions.length;
    const pct = (idx / total) * 100;

    return `
      <div class="topbar">
        <div class="brand">vibe <span class="dot">✦</span> check</div>
        <button class="back-link" onclick="goHome()">← back</button>
      </div>

      <div class="section-head">
        <div class="section-kicker">${quiz.title}</div>
        <div class="section-kicker">${idx + 1} of ${total}</div>
      </div>

      <div class="progress-track">
        <div class="progress-fill" style="width: ${pct}%"></div>
      </div>

      <div class="card-stack fade-in">
        <div>
          <div class="card-tag">${quiz.kicker}</div>
          <div class="card-prompt">${q.q}</div>
          <div class="opt-stack">
            ${q.opts.map((opt, i) => `
              <button class="opt" onclick="answerQuiz(${i})">
                <span class="opt-letter">${String.fromCharCode(65 + i)}</span>${opt.t}
              </button>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  // =============================================================
  // RENDER: QUIZ RESULT
  // =============================================================
  function renderQuizResult() {
    const quiz = state.modeData;
    const scores = {};
    Object.keys(quiz.members).forEach(k => scores[k] = 0);

    state.quizAnswers.forEach((aIdx, qIdx) => {
      const weights = quiz.questions[qIdx].opts[aIdx].w;
      Object.entries(weights).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
    });

    let topKey = Object.keys(quiz.members)[0];
    let topScore = -1;
    Object.entries(scores).forEach(([k, s]) => {
      if (s > topScore) { topScore = s; topKey = k; }
    });

    const winner = quiz.members[topKey];

    return `
      <div class="topbar">
        <div class="brand">vibe <span class="dot">✦</span> check</div>
        <button class="back-link" onclick="goHome()">← back</button>
      </div>

      <div class="fade-in">
        <div class="result-hero">
          <div class="result-kicker">the verdict</div>
          <div class="result-name">${winner.name}</div>
          <div class="result-desc">${winner.desc}</div>
        </div>

        <div class="btn-row" style="justify-content: center;">
          <button class="btn btn-primary" onclick="retryQuiz()">try again</button>
          <button class="btn" onclick="goHome()">pick another mode</button>
        </div>
      </div>
    `;
  }

  // =============================================================
  // RENDER: SORTER QUESTION
  // =============================================================
  function renderSorterQuestion() {
    const idx = state.sorterStep;
    const q = sorterQuestions[idx];
    const pct = (idx / sorterQuestions.length) * 100;

    return `
      <div class="topbar">
        <div class="brand">vibe <span class="dot">✦</span> check</div>
        <button class="back-link" onclick="goHome()">← back</button>
      </div>

      <div class="section-head">
        <div class="section-kicker">weekend sorter</div>
        <div class="section-kicker">${idx + 1} of ${sorterQuestions.length}</div>
      </div>

      <div class="progress-track">
        <div class="progress-fill" style="width: ${pct}%"></div>
      </div>

      <div class="card-stack fade-in">
        <div>
          <div class="card-tag">sorter</div>
          <div class="sorter-q">${q.q}</div>
          <div class="sorter-sub">${q.sub}</div>
          <div class="opt-stack">
            ${q.opts.map((opt, i) => `
              <button class="opt" onclick="answerSorter('${q.key}', '${opt.v}')">
                <span class="opt-letter">${String.fromCharCode(65 + i)}</span>${opt.t}
              </button>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  // =============================================================
  // RENDER: SORTER RESULT
  // =============================================================
  function renderSorterResult() {
    const a = state.sorterAnswers;

    const scored = weekendActivities.map(act => {
      let score = 0;
      const tags = act.tags;

      // Energy (hard-ish)
      if (tags.energy === a.energy) score += 4;
      else if (
        (tags.energy === "low" && a.energy === "med") ||
        (tags.energy === "med" && a.energy === "low") ||
        (tags.energy === "med" && a.energy === "high") ||
        (tags.energy === "high" && a.energy === "med")
      ) score += 1;

      // Social
      if (tags.social.includes(a.social)) score += 4;

      // Mood
      if (tags.mood.includes(a.mood)) score += 5;

      // Time
      if (tags.time.includes(a.time)) score += 3;
      else if (a.time === "weekend") score += 2;

      // Budget
      if (tags.budget.includes(a.budget)) score += 3;
      else if (a.budget === "mid") score += 1;

      // Weather
      if (tags.weather.includes(a.weather)) score += 2;

      return { ...act, score };
    });

    scored.sort((x, y) => y.score - x.score);
    const top = scored.slice(0, 3);

    return `
      <div class="topbar">
        <div class="brand">vibe <span class="dot">✦</span> check</div>
        <button class="back-link" onclick="goHome()">← back</button>
      </div>

      <div class="fade-in">
        <div style="padding: 8px 0 20px;">
          <div class="hero-kicker">weekend sorted</div>
          <h2 style="font-family: 'Instrument Serif', serif; font-size: 38px; line-height: 1.1; margin-bottom: 10px;">three things, <em style="color: var(--rose); font-style: italic;">ranked</em></h2>
          <p style="color: var(--text-dim); font-size: 14px; max-width: 440px;">pick the one that feels right. the top one is the strongest match to what you just said.</p>
        </div>

        <div class="sorter-result">
          ${top.map((act, i) => `
            <div class="result-card ${i === 0 ? 'top' : ''}">
              <div class="result-rank">${i === 0 ? 'top match' : i === 1 ? 'also strong' : 'solid backup'}</div>
              <div class="result-title">${act.title}</div>
              <div class="result-why">${act.why}</div>
            </div>
          `).join('')}
        </div>

        <div class="btn-row" style="margin-top: 28px;">
          <button class="btn btn-primary" onclick="openSorter()">redo the sort</button>
          <button class="btn" onclick="goHome()">home</button>
        </div>
      </div>
    `;
  }

  // =============================================================
  // ACTIONS
  // =============================================================
  window.openMode = function(mode) {
    state.view = mode;
    state.currentIdx = 0;
    if (mode === 'riddles') state.modeData = shuffle([...riddles]);
    if (mode === 'facts') state.modeData = shuffle([...facts]);
    render();
  };

  window.openQuiz = function(key) {
    state.view = 'quiz';
    state.currentIdx = 0;
    state.quizAnswers = [];
    state.currentQuizKey = key;
    if (key === 'katseye') state.modeData = katseyeQuiz;
    if (key === 'blackpink') state.modeData = blackpinkQuiz;
    if (key === 'billie') state.modeData = billieQuiz;
    if (key === 'friend') state.modeData = friendQuiz;
    render();
  };

  window.openSorter = function() {
    state.view = 'sorter';
    state.sorterStep = 0;
    state.sorterAnswers = {};
    render();
  };

  window.answerQuiz = function(optIdx) {
    state.quizAnswers.push(optIdx);
    if (state.currentIdx < state.modeData.questions.length - 1) {
      state.currentIdx++;
      render();
    } else {
      state.view = 'quiz-result';
      render();
    }
  };

  window.retryQuiz = function() {
    state.currentIdx = 0;
    state.quizAnswers = [];
    state.view = 'quiz';
    render();
  };

  window.answerSorter = function(key, value) {
    state.sorterAnswers[key] = value;
    if (state.sorterStep < sorterQuestions.length - 1) {
      state.sorterStep++;
      render();
    } else {
      state.view = 'sorter-result';
      render();
    }
  };

  window.toggleAnswer = function() {
    const box = document.getElementById('answer-box');
    if (box) box.classList.toggle('hidden');
  };

  window.nextItem = function() {
    state.currentIdx = (state.currentIdx + 1) % state.modeData.length;
    render();
  };

  window.shuffleStack = function() {
    state.modeData = shuffle([...state.modeData]);
    state.currentIdx = 0;
    render();
  };

  window.goHome = function() {
    state.view = 'home';
    state.modeData = null;
    state.currentIdx = 0;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // =============================================================
  // RENDER ROUTER
  // =============================================================
  function render() {
    if (state.view === 'home') app.innerHTML = renderHome();
    else if (state.view === 'riddles') app.innerHTML = renderRiddles();
    else if (state.view === 'facts') app.innerHTML = renderFacts();
    else if (state.view === 'quiz') app.innerHTML = renderQuizQuestion();
    else if (state.view === 'quiz-result') app.innerHTML = renderQuizResult();
    else if (state.view === 'sorter') app.innerHTML = renderSorterQuestion();
    else if (state.view === 'sorter-result') app.innerHTML = renderSorterResult();
  }

  // =============================================================
  // UTILS
  // =============================================================
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // =============================================================
  // INIT
  // =============================================================
  render();
</script>

</body>
</html>
