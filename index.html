<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>side quest ✦ the feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #08060F;
    --bg: #15111F;
    --bg-2: #1D1730;
    --surface: #221B36;
    --surface-2: #2E2545;
    --line: #3C3154;
    --accent: #D4B5FF;
    --accent-soft: #A68FD9;
    --rose: #FFB8D1;
    --rose-deep: #E88FB3;
    --gold: #E8C547;
    --mint: #A8E6CF;
    --coral: #FF9AA2;
    --muted: #8C84A3;
    --text: #EDE6F5;
    --text-dim: #C4BAD6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    font-family: 'Inter Tight', sans-serif;
    color: var(--text);
    background: var(--bg);
    overflow-x: hidden;
  }

  /* Grainy film texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.08;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");
    mix-blend-mode: screen;
  }

  /* Atmospheric radial glow */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(212, 181, 255, 0.12) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 85%, rgba(255, 184, 209, 0.08) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 50%, rgba(232, 197, 71, 0.04) 0%, transparent 60%);
  }

  #app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    padding: 20px 24px 80px;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ---------- TOP BAR ---------- */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    background: rgba(34, 27, 54, 0.6);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 100px;
    margin-bottom: 24px;
    border: 1px solid var(--line);
  }

  .brand {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    letter-spacing: -0.01em;
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
  }

  .brand span.star { color: var(--gold); font-style: normal; }
  .brand span.sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-style: normal;
    padding-left: 6px;
    border-left: 1px solid var(--line);
  }

  .stats {
    display: flex;
    gap: 16px;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-chip .num {
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
  }

  .stat-chip .label {
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* ---------- HERO ---------- */
  .hero {
    padding: 40px 0 32px;
    position: relative;
  }

  .hero-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .hero h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(48px, 10vw, 96px);
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .hero h1 em {
    font-style: italic;
    color: var(--rose);
    display: block;
    font-size: 0.9em;
    margin-top: -4px;
  }

  .hero h1 .dim {
    color: var(--muted);
    font-style: italic;
    font-size: 0.55em;
    font-weight: 300;
    display: inline-block;
    margin-left: 8px;
  }

  .hero-sub {
    font-size: 15px;
    color: var(--text-dim);
    margin-top: 20px;
    max-width: 440px;
    line-height: 1.55;
  }

  /* ---------- DAILY CARD ---------- */
  .daily {
    background: linear-gradient(135deg, var(--bg-2) 0%, var(--surface) 100%);
    border-radius: 28px;
    padding: 28px 26px;
    margin: 20px 0 36px;
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }

  .daily::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -80px;
    width: 240px;
    height: 240px;
    background: radial-gradient(circle, rgba(232, 143, 179, 0.3) 0%, transparent 65%);
    pointer-events: none;
  }

  .daily-tag {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .daily-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--rose);
  }

  .daily-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .daily-text {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(22px, 4vw, 30px);
    line-height: 1.2;
    color: var(--text);
    font-style: italic;
    letter-spacing: -0.01em;
    position: relative;
  }

  .daily-reveal {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.55;
    font-style: normal;
  }

  .daily-reveal.show { display: block; animation: fadeUp 0.4s; }

  .daily-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 18px;
    border-radius: 100px;
    cursor: pointer;
    margin-top: 18px;
    transition: all 0.2s;
  }

  .daily-btn:hover {
    background: var(--accent);
    color: var(--ink);
    border-color: var(--accent);
  }

  /* ---------- MODE GRID ---------- */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 28px 0 14px;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
  }

  .mode-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 24px 22px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .mode-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--tint, transparent) 0%, transparent 70%);
    opacity: 0.15;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .mode-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }

  .mode-card:hover::before { opacity: 0.35; }

  .mode-icon {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    font-style: italic;
    color: var(--tint, var(--accent));
    line-height: 1;
  }

  .mode-title {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-top: 6px;
  }

  .mode-desc {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.4;
  }

  .tint-rose { --tint: #FFB8D1; }
  .tint-accent { --tint: #D4B5FF; }
  .tint-gold { --tint: #E8C547; }
  .tint-mint { --tint: #A8E6CF; }
  .tint-coral { --tint: #FF9AA2; }
  .tint-sky { --tint: #9AD0FF; }

  /* ---------- GAME VIEW ---------- */
  .game-view {
    animation: fadeUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    gap: 16px;
  }

  .back-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .back-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .progress-bar {
    flex: 1;
    height: 2px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rose) 0%, var(--accent) 100%);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ---------- CARD (universal question wrapper) ---------- */
  .card {
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
    border: 1px solid var(--line);
    border-radius: 32px;
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
    min-height: 360px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -150px;
    right: -120px;
    width: 360px;
    height: 360px;
    background: radial-gradient(circle, var(--card-glow, rgba(212, 181, 255, 0.15)) 0%, transparent 60%);
    pointer-events: none;
  }

  .card > * { position: relative; }

  .card-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--tint, var(--accent));
    margin-bottom: 14px;
  }

  .card-q {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(24px, 4.5vw, 36px);
    line-height: 1.2;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 24px;
  }

  .card-q strong {
    font-style: normal;
    font-weight: 500;
    color: var(--rose);
    text-decoration: none;
  }

  .card-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: auto;
  }

  .action-btn {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 14px 22px;
    border-radius: 100px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    flex: 1 1 auto;
    min-width: 120px;
  }

  .action-btn:hover {
    background: var(--accent);
    color: var(--ink);
    border-color: var(--accent);
  }

  .action-btn.picked { background: var(--accent); color: var(--ink); border-color: var(--accent); }
  .action-btn.right { background: var(--mint); color: var(--ink); border-color: var(--mint); }
  .action-btn.wrong { background: rgba(255, 154, 162, 0.25); color: var(--coral); border-color: var(--coral); opacity: 0.7; }
  .action-btn:disabled { cursor: default; }

  /* WYR specific */
  .wyr-opts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: auto;
  }

  .wyr-opts .action-btn {
    text-align: center;
    padding: 24px 18px;
    min-height: 100px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 18px;
    line-height: 1.3;
    border-radius: 20px;
  }

  .wyr-or {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--bg-2);
    padding: 6px 12px;
    border-radius: 100px;
    pointer-events: none;
    z-index: 2;
    border: 1px solid var(--line);
  }

  .wyr-wrap { position: relative; margin-top: auto; }

  /* Reveal area */
  .reveal {
    display: none;
    margin-top: 20px;
    padding: 18px 20px;
    background: rgba(212, 181, 255, 0.08);
    border: 1px solid rgba(212, 181, 255, 0.2);
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.55;
    color: var(--text-dim);
  }

  .reveal.show { display: block; animation: fadeUp 0.3s; }

  .reveal strong { color: var(--rose); font-weight: 500; }

  .reveal .vibe-check {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display: block;
    margin-bottom: 6px;
  }

  /* Next button */
  .next-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    gap: 12px;
  }

  .skip-btn, .next-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .skip-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
  }

  .skip-btn:hover { color: var(--text); border-color: var(--muted); }

  .next-btn {
    background: var(--rose);
    border: 1px solid var(--rose);
    color: var(--ink);
  }

  .next-btn:hover { background: var(--accent); border-color: var(--accent); }

  /* ---------- END OF RUN SCREEN ---------- */
  .wrap-up {
    text-align: center;
    padding: 48px 20px;
  }

  .wrap-up .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 14px;
  }

  .wrap-up h2 {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(36px, 6vw, 54px);
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 16px;
  }

  .wrap-up-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 30px 0;
    flex-wrap: wrap;
  }

  .wrap-stat {
    text-align: center;
  }

  .wrap-stat .num {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 56px;
    line-height: 1;
    color: var(--rose);
  }

  .wrap-stat .lbl {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  .wrap-up-note {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 440px;
    margin: 0 auto 24px;
    line-height: 1.55;
  }

  /* ---------- TOAST (small celebration) ---------- */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--accent);
    color: var(--ink);
    padding: 10px 20px;
    border-radius: 100px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
    box-shadow: 0 8px 24px rgba(212, 181, 255, 0.3);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ---------- FOOTER ---------- */
  .footer-note {
    text-align: center;
    margin-top: 60px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.7;
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 600px) {
    #app { padding: 14px 14px 60px; }
    .topbar { padding: 10px 14px; border-radius: 100px; flex-wrap: wrap; gap: 10px; }
    .stats { gap: 10px; font-size: 10px; }
    .brand { font-size: 20px; }
    .card { padding: 28px 22px; min-height: 320px; }
    .wyr-opts { grid-template-columns: 1fr; }
    .wyr-or { position: static; transform: none; margin: 6px auto; display: inline-block; }
    .wrap-up-stats { gap: 20px; }
    .wrap-stat .num { font-size: 42px; }
  }

  /* ---------- ANIMATIONS ---------- */
  .card-swap {
    animation: cardSwap 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes cardSwap {
    from { opacity: 0; transform: translateY(15px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>
<body>

<div id="app"></div>

<div class="toast" id="toast">+1 brain cell</div>

<script>
  // =============================================================
  // CONTENT POOL · mixed types
  // =============================================================
  const pool = [
    // Riddles
    { type: 'riddle', q: "I speak without a mouth and hear without ears. I have no body, but I come alive with the wind.", a: "An echo." },
    { type: 'riddle', q: "I have cities but no houses, forests but no trees, water but no fish. What am I?", a: "A map." },
    { type: 'riddle', q: "What gets wetter the more it dries?", a: "A towel." },
    { type: 'riddle', q: "The more you take, the more you leave behind. What are they?", a: "Footsteps." },
    { type: 'riddle', q: "I have keys but no locks. I have space but no room. You can enter but you can't leave.", a: "A keyboard." },
    { type: 'riddle', q: "What has a head, a tail, but no body?", a: "A coin." },
    { type: 'riddle', q: "What has hands but cannot clap?", a: "A clock." },
    { type: 'riddle', q: "I'm tall when I'm young and short when I'm old. What am I?", a: "A candle." },
    { type: 'riddle', q: "What five-letter word becomes shorter when you add two letters to it?", a: "Short (add 'er' to get shorter)." },
    { type: 'riddle', q: "What gets broken without being held, touched or dropped?", a: "A promise." },
    { type: 'riddle', q: "I'm lighter than a feather but even the strongest person can't hold me for 5 minutes.", a: "Your breath." },
    { type: 'riddle', q: "What has many teeth but never bites?", a: "A comb. (Or a zip.)" },
    { type: 'riddle', q: "Two coins add up to 30p. One of them is NOT a 20p. What are they?", a: "A 20p and a 10p. One of them (the 10p) isn't a 20p. Classic misdirection." },
    { type: 'riddle', q: "There's a one-storey house where everything is pink. Pink walls, pink floor, pink ceiling. What colour are the stairs?", a: "There are no stairs. It's a one-storey house." },
    { type: 'riddle', q: "What can fill a room but takes up no space?", a: "Light." },

    // Mystery drops
    { type: 'mystery', text: "The shortest war in history lasted 38 minutes.", reveal: "Britain vs Zanzibar, 1896. The Sultan refused to step down, Britain bombed the palace, he surrendered. Less than 40 minutes total. Wild." },
    { type: 'mystery', text: "Cleopatra lived closer in time to the Moon landing than to the building of the Great Pyramid.", reveal: "The pyramid was built around 2560 BCE. Cleopatra lived around 30 BCE (roughly 2,500 years later). The Moon landing was 1969 CE (roughly 2,000 years after her). She's closer to us than to the pyramids." },
    { type: 'mystery', text: "Octopuses have 9 brains, 3 hearts, and blue blood.", reveal: "One central brain and eight smaller ones (one per arm). Two hearts pump blood through the gills, one through the body. Their blood is blue because of copper, not iron like ours." },
    { type: 'mystery', text: "In 1518 in Strasbourg, hundreds of people danced uncontrollably for weeks. Some died.", reveal: "It's called the Dancing Plague of 1518. Historians still don't fully know why. Theories: stress-induced mass hysteria, ergot poisoning from mouldy bread, or religious trance. Nobody's sure." },
    { type: 'mystery', text: "The Eiffel Tower is about 15cm taller in summer than in winter.", reveal: "Metal expands when heated. Summer sun warms the iron, the tower stretches. It's a real physics phenomenon called thermal expansion." },
    { type: 'mystery', text: "On HD 189733b, a planet 63 light years away, it rains glass sideways at 5,000 mph.", reveal: "The atmosphere is full of silicate particles and wind speeds are violent enough to shred the glass shards sideways. Beautiful blue colour though. Would not visit." },
    { type: 'mystery', text: "A shrimp's heart is inside its head.", reveal: "So is its stomach and most of its nervous system. Shrimps are basically living heads with tails." },
    { type: 'mystery', text: "Bananas are slightly radioactive.", reveal: "Because of the potassium they contain (potassium-40 is radioactive). You'd need to eat about 10 million in one sitting for it to hurt you. So, manageable." },
    { type: 'mystery', text: "There are more trees on Earth than stars in the Milky Way.", reveal: "Roughly 3 trillion trees on Earth. The Milky Way has an estimated 100 to 400 billion stars. Earth wins." },
    { type: 'mystery', text: "The first computer bug was an actual bug.", reveal: "In 1947 a moth got stuck in the Harvard Mark II computer. Engineers taped it into the logbook and wrote 'first actual case of bug being found'. The term 'debugging' is from this." },
    { type: 'mystery', text: "Sharks are older than trees.", reveal: "Sharks have been around for about 450 million years. Trees only evolved around 350 million years ago. Sharks watched trees evolve from the water." },
    { type: 'mystery', text: "There's enough gold in Earth's core to coat the planet's surface in a layer half a metre thick.", reveal: "It's just inaccessible (the core is thousands of km down and unbelievably hot). Gold is dense, so during Earth's formation it sank. Almost all the gold we mine is from meteorite impacts delivering fresh gold to the crust." },

    // Fact or cap
    { type: 'factcap', text: "Lightning is hotter than the surface of the sun.", answer: true, explain: "A lightning bolt reaches around 30,000°C. The sun's surface is about 5,500°C. The sun's core is much hotter, but the surface loses this one." },
    { type: 'factcap', text: "Henry VIII had seven wives.", answer: false, explain: "Six, famously. Mnemonic: divorced, beheaded, died, divorced, beheaded, survived. Catherine of Aragon, Anne Boleyn, Jane Seymour, Anne of Cleves, Catherine Howard, Catherine Parr." },
    { type: 'factcap', text: "The Nile flows north, not south.", answer: true, explain: "Yes. It flows from central Africa to the Mediterranean. One of the few major rivers that flows northward. Confuses people because maps usually have 'up = north'." },
    { type: 'factcap', text: "Tokyo has more people in its metro area than the whole of Canada.", answer: true, explain: "Greater Tokyo: around 37 million people. Canada: around 40 million. It's close, but Tokyo's metro population has been bigger than some estimates of Canada's in recent years. Tokyo is genuinely one of the biggest urban areas ever." },
    { type: 'factcap', text: "Plants release oxygen as a waste product when they make their food.", answer: true, explain: "This is photosynthesis: plants use sunlight to turn carbon dioxide and water into sugar, and they basically go 'ew' and dump the oxygen out. We exist because of this dumping." },
    { type: 'factcap', text: "The Great Fire of London was in 1666.", answer: true, explain: "Started 2 September 1666, in a bakery on Pudding Lane. Burned for four days. Destroyed around 13,000 houses. Only 6 official deaths (though the real number was probably higher)." },
    { type: 'factcap', text: "Venus is the hottest planet in the solar system.", answer: true, explain: "Despite Mercury being closer to the sun, Venus has a thick CO2 atmosphere that traps heat (runaway greenhouse effect). Venus averages around 465°C. Mercury: much cooler because it has almost no atmosphere." },
    { type: 'factcap', text: "Elizabeth I married three times.", answer: false, explain: "She never married. Earned the nickname 'the Virgin Queen'. Had plenty of suitors and flirtations but politically staying single gave her power. The colony of Virginia was named after her." },
    { type: 'factcap', text: "Your stomach acid is strong enough to dissolve a razor blade (given enough time).", answer: true, explain: "Stomach acid is hydrochloric acid, pH around 1-2. Your stomach constantly replaces its lining to avoid digesting itself. Don't test this. Seriously." },
    { type: 'factcap', text: "The Industrial Revolution started in Germany.", answer: false, explain: "Britain. Starting around 1760. Steam power, factories, spinning jenny, all kicked off in Britain. Germany industrialised later, in the 1800s." },
    { type: 'factcap', text: "Earthquakes happen because the Earth's crust is made of moving plates.", answer: true, explain: "Tectonic plates grind against each other. When they slip suddenly, the shock wave we feel is an earthquake. The most earthquakes happen around the Pacific Ring of Fire." },
    { type: 'factcap', text: "The Amazon rainforest makes 20% of the world's oxygen.", answer: false, explain: "Common myth. The real figure is closer to 6%. Ocean plankton actually produces more than half the world's oxygen. Still, losing the Amazon would be catastrophic for other reasons (biodiversity, carbon storage, local climate)." },
    { type: 'factcap', text: "Bananas are technically berries.", answer: true, explain: "Botanically, a berry is a fruit from a single flower with seeds inside the flesh. Bananas qualify. Strawberries? Not berries. Botany is chaotic." },
    { type: 'factcap', text: "The Sahara Desert is larger than Australia.", answer: true, explain: "Sahara: about 9.2 million square kilometres. Australia: about 7.7 million. The Sahara is the largest hot desert in the world, covering most of North Africa." },
    { type: 'factcap', text: "Olivia Rodrigo's debut album SOUR came out in 2020.", answer: false, explain: "2021. Released 21st May. 'drivers license' had dropped in January and the album followed four months later. Massive year." },
    { type: 'factcap', text: "Billie Eilish is the youngest person ever to win Album of the Year at the Grammys.", answer: true, explain: "She was 18 when 'When We All Fall Asleep, Where Do We Go?' won in 2020. Youngest solo artist ever at that point. Also swept the 'big four' Grammys that night." },
    { type: 'factcap', text: "The 13 American colonies were on the west coast of North America.", answer: false, explain: "East coast. Virginia, Massachusetts, New York, etc. The west coast wasn't settled by Europeans until much later." },
    { type: 'factcap', text: "All elements heavier than iron are made in stars when those stars explode.", answer: true, explain: "Supernovas and neutron star collisions. Every atom of gold, platinum, uranium in existence was forged in an exploding star before Earth even formed. The ring on your finger is exploded-star residue. Romantic." },
    { type: 'factcap', text: "King Charles I of England was executed in 1649.", answer: true, explain: "After losing the English Civil War. Beheaded in front of Banqueting House in Whitehall. For a few years afterwards, England had no king at all. Oliver Cromwell ran things until 1658." },
    { type: 'factcap', text: "Water is the only substance that expands when it freezes.", answer: false, explain: "There are a few others (bismuth, silicon, gallium). But water is the most famous and most important. Ice floats because of this. Life on Earth depends on it." },

    // Would you rather
    { type: 'wyr', a: "Only eat food that photosynthesises", b: "Only eat food that breathes", context: "Option A: plants and fungi. Option B: anything from the animal kingdom. Most of the world eats both, which is the boring answer." },
    { type: 'wyr', a: "Live on the Pacific Ring of Fire", b: "Live in the middle of Siberia", context: "Ring of Fire: earthquakes and volcanoes but also some of the most beautiful coastlines on Earth. Siberia: stable ground but minus 40 in winter." },
    { type: 'wyr', a: "Fight Henry VIII with a sword", b: "Debate Elizabeth I in Latin", context: "Henry: physically huge, bad temper, legally allowed to execute you. Elizabeth: one of the most educated rulers in history, spoke six languages fluently. Genuinely tough call." },
    { type: 'wyr', a: "Be famous in 1924", b: "Be famous in 2024", context: "1924: silent films, radio starting. Fame was smaller but more permanent. 2024: TikTok, reality TV, burn out in 18 months. Pick your poison." },
    { type: 'wyr', a: "Know the name of every country in Africa", b: "Know every element on the periodic table", context: "54 countries in Africa. 118 elements on the periodic table. So one's easier. But one is a LOT more chemistry." },
    { type: 'wyr', a: "Live next to a volcano in Iceland", b: "Live on the San Andreas Fault in California", context: "Both are high-risk geology. Iceland: volcanic eruptions, but also natural hot springs. California: earthquakes, but also actual sun. Vibes-based decision." },
    { type: 'wyr', a: "Have Olivia Rodrigo write a song about you", b: "Have Billie Eilish write a song about you", context: "Olivia: it'll be dramatic, emotional, you'll sound like the villain. Billie: it'll be whispered, haunting, unclear who the villain is. Both expose you. Pick." },
    { type: 'wyr', a: "Meet Shakespeare", b: "Meet Cleopatra", context: "Shakespeare: probably shorter than you and smells weird. Cleopatra: ruled Egypt, spoke about 9 languages, allegedly gorgeous. The correct answer is Cleopatra." },
    { type: 'wyr', a: "Understand every animal's language", b: "Speak any human language fluently", context: "Option A: you can argue with cats. Option B: you can travel anywhere and argue with humans. Philosophical." },
    { type: 'wyr', a: "Go back to the Tudors for a week", b: "Go forward 200 years for a week", context: "Tudors: plague, no painkillers, weird food, Henry VIII potentially vibing. 200 years forward: unknown technology, possible dystopia, questionable air quality. Nothing's safe." },
    { type: 'wyr', a: "Never sleep (but never feel tired)", b: "Never eat (but never feel hungry)", context: "Option A: an extra 1/3 of life unlocked. Option B: save thousands of hours on shopping and cooking. Both are cheats." },
    { type: 'wyr', a: "Be able to see in the dark", b: "Be able to hear colour", context: "Synaesthesia is the real version of option B. Some people already do it. Artists have claimed to hear music when they see paintings. Option A: nocturnal hunter era." },

    // Multiple choice
    // Places
    { type: 'mc', q: "This African country has 11 official languages, Trevor Noah, and produces 10% of the world's gold.", options: ["Egypt", "Nigeria", "South Africa", "Kenya"], correct: 2, explain: "South Africa. 11 official languages (English, Afrikaans, Zulu, Xhosa, Sotho and more). End of apartheid in 1994. Capital cities: Pretoria, Cape Town, Bloemfontein (it has three)." },
    { type: 'mc', q: "The longest river in the world.", options: ["The Amazon", "The Yangtze", "The Nile", "The Mississippi"], correct: 2, explain: "The Nile at about 6,650km. The Amazon (around 6,400km) is usually second but carries WAY more water. Debate has raged for years over which is truly longest. The Nile flows through eleven countries." },
    { type: 'mc', q: "What causes a tsunami?", options: ["Strong winds", "A meteor always", "An underwater earthquake or landslide", "Climate change"], correct: 2, explain: "Sudden displacement of water, usually from underwater earthquakes when tectonic plates shift. The energy travels across the ocean as a huge wave. The 2004 Indian Ocean tsunami was one of the worst ever recorded." },
    { type: 'mc', q: "The area around the Pacific Ocean with 75% of the world's volcanoes and 90% of its earthquakes is called…", options: ["The Bermuda Triangle", "The Ring of Fire", "The Equator", "The Great Barrier"], correct: 1, explain: "The Ring of Fire. 40,000 km of coastline where several tectonic plates meet. It includes Japan, Indonesia, the Philippines, New Zealand, Chile, the US west coast, and more." },
    { type: 'mc', q: "A river forms a curved loop, then cuts off the curve and leaves a U-shaped lake. What's that lake called?", options: ["A tarn", "An oxbow lake", "A lagoon", "A delta"], correct: 1, explain: "An oxbow lake. The river takes a shortcut through the loop and leaves the curve behind as an isolated lake. Named after the U-shaped bow part of an ox's yoke." },
    { type: 'mc', q: "The vast hot desert covering most of North Africa.", options: ["The Gobi", "The Kalahari", "The Sahara", "The Atacama"], correct: 2, explain: "The Sahara. About 9.2 million km², bigger than Australia. Daytime temperatures regularly hit 45°C. At night in winter it can drop to freezing." },
    { type: 'mc', q: "Climate zone with hot rainy summers and a distinct dry season, usually near the equator but not right on it. Think lions, acacia trees, zebras.", options: ["Tundra", "Savanna", "Taiga", "Rainforest"], correct: 1, explain: "Savanna (also spelled savannah). Found in parts of Africa, South America and Australia. Grassland with scattered trees. Most of the Lion King takes place here." },
    { type: 'mc', q: "Megacity: Lagos, Nigeria has a population of roughly…", options: ["2 million", "8 million", "20 million", "50 million"], correct: 2, explain: "Around 20 million. One of the fastest-growing cities in the world. Estimated to hit 32 million by 2050. For comparison: London is about 9 million." },
    { type: 'mc', q: "The imaginary line around the Earth's middle at 0° latitude.", options: ["The prime meridian", "The equator", "The tropic of Cancer", "The international date line"], correct: 1, explain: "The equator. Runs through 13 countries. The prime meridian (option A) runs through Greenwich, London, at 0° longitude. Easy to mix them up." },
    { type: 'mc', q: "What's 'fair trade' about?", options: ["A stock market for fruit", "Producers in poorer countries getting a fair price", "Discount retailers only", "A TV show"], correct: 1, explain: "Farmers and producers in poorer countries historically got tiny amounts of the final product's price (e.g. cocoa farmers making pennies while chocolate bars sold for pounds). Fair trade certification means a minimum fair price, safer working conditions, and no child labour." },
    { type: 'mc', q: "The thin layer where we all live on the Earth's surface is called…", options: ["The atmosphere", "The crust", "The mantle", "The core"], correct: 1, explain: "The crust. Only about 5-70km thick (thinnest under oceans, thickest under mountains). Below that: mantle (hot, slow-flowing rock), then outer core (liquid iron), then inner core (solid iron, really hot)." },
    { type: 'mc', q: "When a river enters the sea and drops sediment forming a triangle-shaped landform, what's that called?", options: ["A delta", "An estuary", "A fjord", "A peninsula"], correct: 0, explain: "A delta. Named after the Greek letter Δ because of the triangle shape. The Nile Delta, the Mississippi Delta, and the Ganges Delta are famous examples." },
    { type: 'mc', q: "Which of these is NOT a greenhouse gas?", options: ["Carbon dioxide", "Methane", "Nitrogen", "Water vapour"], correct: 2, explain: "Nitrogen makes up 78% of our atmosphere but isn't a greenhouse gas. CO2, methane and water vapour all trap heat. Methane is actually 25x more powerful than CO2 at trapping heat (it just doesn't stay in the atmosphere as long)." },

    // Era
    { type: 'mc', q: "Henry VIII had six wives. The correct order was: divorced, beheaded, died, divorced, beheaded, ___", options: ["escaped", "survived", "divorced", "beheaded"], correct: 1, explain: "Survived. Catherine Parr outlived Henry. The full list: Catherine of Aragon (divorced), Anne Boleyn (beheaded), Jane Seymour (died in childbirth), Anne of Cleves (divorced), Catherine Howard (beheaded), Catherine Parr (survived)." },
    { type: 'mc', q: "The Spanish sent an enormous fleet of 130 ships to invade England in 1588. What was it called?", options: ["The Spanish Fleet", "The Spanish Armada", "The Armadillo", "The Conquistadors"], correct: 1, explain: "The Spanish Armada. Sent by King Philip II of Spain to overthrow Elizabeth I. England defeated them with smaller, faster ships plus a huge storm. Major moment for English naval power." },
    { type: 'mc', q: "What happened in 1066?", options: ["The Black Death", "The Norman Conquest", "The Great Fire", "The Magna Carta"], correct: 1, explain: "The Norman Conquest. William of Normandy (William the Conqueror) invaded England and beat King Harold at the Battle of Hastings. It reshaped English language, law, and class structure forever. The year every history student memorises." },
    { type: 'mc', q: "The 1215 document that (for the first time) limited the king's power is called…", options: ["The Magna Carta", "The Domesday Book", "The Bill of Rights", "The Constitution"], correct: 0, explain: "Magna Carta (meaning 'Great Charter' in Latin). King John was forced to sign it by angry barons. It established that even the king had to follow the law. Foundation of English legal tradition." },
    { type: 'mc', q: "Who was in charge of Britain between 1653 and 1658, after Charles I was executed and before a new king?", options: ["Queen Victoria", "Oliver Cromwell", "Guy Fawkes", "William Shakespeare"], correct: 1, explain: "Oliver Cromwell, Lord Protector. It's the only time Britain ever went without a monarch (called the Interregnum). Christmas and theatres were banned because Cromwell was a strict Puritan. His son ruled briefly after him, then the monarchy came back." },
    { type: 'mc', q: "The Industrial Revolution kicked off in Britain around…", options: ["1200", "1500", "1760", "1900"], correct: 2, explain: "Around 1760. Steam engines, factories, spinning jenny. It changed basically everything: how people worked, where they lived, what they ate, what they wore. Britain became 'the workshop of the world'." },
    { type: 'mc', q: "What was the Great Exhibition of 1851?", options: ["A Victorian art show", "A massive trade and technology expo in London", "A theatre festival", "A military parade"], correct: 1, explain: "A huge expo showing off industrial and cultural achievements from around the world, held in the Crystal Palace (a gigantic glass and iron building in Hyde Park). Six million people visited. It was a Victorian flex." },
    { type: 'mc', q: "Women over 30 got the vote in Britain in 1918. When did women get equal voting rights with men?", options: ["1918", "1928", "1945", "1970"], correct: 1, explain: "1928. It took another decade of campaigning from the suffragettes and suffragists. The 1928 law finally let all women vote at 21, same as men. Emmeline Pankhurst was a key figure (she died that same year)." },
    { type: 'mc', q: "The British Empire reached its largest size in…", options: ["1750", "1850", "1922", "1970"], correct: 2, explain: "1922. About 1/4 of Earth's land surface. Then it started to unravel. India gained independence in 1947, most other colonies between 1947 and 1980. Hong Kong returned to China in 1997." },
    { type: 'mc', q: "Victorian Britain was named after which queen?", options: ["Queen Elizabeth I", "Queen Victoria", "Queen Mary", "Queen Anne"], correct: 1, explain: "Queen Victoria. Reigned 1837-1901, one of the longest reigns ever (Elizabeth II beat it). The Victorian era = industrial revolution, British Empire peak, Charles Dickens, Jack the Ripper, and really questionable children's employment laws." },
    { type: 'mc', q: "In 1807, the British Parliament banned what?", options: ["The Catholic religion", "The slave trade", "Alcohol", "The monarchy"], correct: 1, explain: "The transatlantic slave trade (the buying and transporting). Slavery itself wasn't abolished in most of the empire until 1833. William Wilberforce spent decades campaigning. Olaudah Equiano's autobiography helped change public opinion." },

    // Body
    { type: 'mc', q: "The smallest unit of life that can function on its own.", options: ["Atom", "Cell", "Molecule", "Organ"], correct: 1, explain: "A cell. The human body has about 37 trillion of them. There are two main types: prokaryotic (bacteria, simple) and eukaryotic (us, plants, fungi, more complex with a nucleus). A cell is the smallest thing considered 'alive'." },
    { type: 'mc', q: "The 'power station' of a cell, which turns food into usable energy, is called…", options: ["The nucleus", "The ribosome", "The mitochondria", "The vacuole"], correct: 2, explain: "Mitochondria. They turn glucose into ATP, which is the energy currency your body uses for literally everything. You have thousands per cell. Famously: 'the mitochondria is the powerhouse of the cell'." },
    { type: 'mc', q: "Plants turn sunlight, water, and CO2 into food. What's this process called?", options: ["Respiration", "Photosynthesis", "Digestion", "Metabolism"], correct: 1, explain: "Photosynthesis. Formula: 6CO2 + 6H2O + light → C6H12O6 + 6O2. In English: carbon dioxide plus water plus sunlight becomes sugar plus oxygen. Plants are the reason we have breathable air." },
    { type: 'mc', q: "When you breathe in, the oxygen goes into tiny air sacs in your lungs called…", options: ["Bronchi", "Alveoli", "Trachea", "Villi"], correct: 1, explain: "Alveoli. You have around 480 million of them. They're super thin so oxygen can pass through into your blood, and CO2 can come out. Total surface area: about the size of a tennis court. Compressed into your chest." },
    { type: 'mc', q: "A heart pumps blood around the body. In mammals, how many chambers does the heart have?", options: ["1", "2", "3", "4"], correct: 3, explain: "4 chambers: two atria (top), two ventricles (bottom). Right side pumps blood to the lungs to collect oxygen. Left side pumps oxygenated blood around the rest of the body. Fish only have 2 chambers. Most reptiles have 3." },
    { type: 'mc', q: "Ecosystems have producers, consumers, and decomposers. Which one makes its own food?", options: ["Producers", "Consumers", "Decomposers", "Predators"], correct: 0, explain: "Producers = mostly plants (they photosynthesise). Consumers eat other things. Decomposers (like fungi, bacteria) break down dead stuff. A forest couldn't work without all three working together." },
    { type: 'mc', q: "A change that helps an organism survive better is called an…", options: ["Extinction", "Adaptation", "Mutation", "Imitation"], correct: 1, explain: "Adaptation. Can be physical (camels storing fat in humps, polar bears having white fur) or behavioural (birds migrating). Adaptations happen over generations through natural selection. Darwin's whole thing." },

    // Matter
    { type: 'mc', q: "The pH scale runs 0 to 14. Pure water is…", options: ["0", "7", "14", "100"], correct: 1, explain: "7. Exactly neutral. Below 7: acidic (lemon juice is around 2, stomach acid around 1). Above 7: alkaline (bleach is around 12). Strong acids and alkalis can burn skin. Your body tries to stay around 7.4." },
    { type: 'mc', q: "Water is H2O. What's the '2' referring to?", options: ["Two hydrogen atoms", "Two oxygen atoms", "Two bonds", "Two water molecules"], correct: 0, explain: "Two hydrogen atoms. One water molecule is 2 hydrogens + 1 oxygen. Hence H2O. The '2' is a subscript telling you how many hydrogen atoms are in one molecule." },
    { type: 'mc', q: "Elements on the periodic table are arranged by…", options: ["Colour", "Density", "Number of protons (atomic number)", "Alphabet"], correct: 2, explain: "Atomic number (the number of protons in the nucleus). Hydrogen = 1 proton, helium = 2, lithium = 3, and so on. Columns = groups (similar chemical behaviour). Rows = periods. It's one of the most beautiful things in science." },
    { type: 'mc', q: "When an acid reacts with an alkali, they cancel each other out and form…", options: ["A metal", "A salt and water", "A gas", "An explosion always"], correct: 1, explain: "Salt and water. The reaction is called neutralisation. Example: hydrochloric acid + sodium hydroxide → salt (sodium chloride, actual table salt) + water. The indigestion tablets you take work on this principle (neutralising stomach acid)." },
    { type: 'mc', q: "Which of these is a compound, not a mixture?", options: ["Sea water", "Air", "Table salt", "Milk"], correct: 2, explain: "Table salt (NaCl) is a compound: sodium and chlorine chemically bonded. Sea water, air, and milk are mixtures (multiple substances together but not chemically bonded). In a mixture you can physically separate the ingredients. In a compound you can't without a chemical reaction." },
    { type: 'mc', q: "What do you call it when a liquid turns into a gas (like water becoming steam)?", options: ["Freezing", "Melting", "Evaporation", "Condensation"], correct: 2, explain: "Evaporation (or boiling if it's fast and happens throughout the liquid). Condensation is the opposite (gas → liquid). Sublimation is solid going straight to gas (like dry ice). The states of matter are a whole vibe." },

    // Physics vibes
    { type: 'mc', q: "Newton's first law: an object keeps doing what it's doing unless…", options: ["It gets bored", "A force acts on it", "It rains", "Gravity stops"], correct: 1, explain: "A force acts on it. This is called inertia. A ball rolling on a perfect surface would roll forever. In real life, friction (a force) slows it down. You feel inertia every time a car brakes and your body keeps moving forward." },
    { type: 'mc', q: "Sound travels as…", options: ["Vibrations through a medium", "Light waves", "Electricity", "Magic"], correct: 0, explain: "Vibrations (waves) through a medium (usually air, but also water or solids). Sound travels faster through solids than through air. It can't travel through a vacuum, which is why space is silent. Speed of sound in air: about 343 m/s." },
    { type: 'mc', q: "The planet with the most moons is…", options: ["Earth", "Jupiter", "Saturn", "Mars"], correct: 2, explain: "Saturn, with at least 146 known moons as of 2023. Jupiter has 95. Earth has 1. The moons have names like Titan, Enceladus, Mimas (which genuinely looks like the Death Star)." },
    { type: 'mc', q: "Gravity on the Moon is about…", options: ["The same as Earth", "1/6 of Earth's", "Zero", "Twice as strong"], correct: 1, explain: "About 1/6 of Earth's. That's why astronauts bounce around. If you weigh 60kg on Earth, you'd weigh 10kg on the Moon. Jupiter's gravity is 2.5x stronger than Earth's. The sun's gravity is over 27x stronger." },
    { type: 'mc', q: "A material that electricity flows through easily is called…", options: ["An insulator", "A conductor", "A resistor", "A battery"], correct: 1, explain: "A conductor. Most metals are good conductors (copper, gold, silver). An insulator blocks electricity (plastic, rubber, glass). Which is why wires are metal inside with plastic outside. Electricity is basically electrons flowing through a conductor." },
    { type: 'mc', q: "Light travels incredibly fast. Roughly how fast?", options: ["300 km/h", "30,000 km/h", "300,000 km/s", "3 million km/s"], correct: 2, explain: "300,000 km PER SECOND. It could circle the Earth 7 times in 1 second. Light from the sun takes 8 minutes to reach us. Light from the nearest star (other than the sun) takes 4 years. Space is really, really big." },

    // Pop culture
    { type: 'mc', q: "Olivia Rodrigo's first #1 hit was…", options: ["good 4 u", "drivers license", "vampire", "traitor"], correct: 1, explain: "'drivers license', January 2021. It dominated the charts for 8 weeks. Inspired the whole SOUR album. The driving metaphor was already iconic before the bridge hit." },
    { type: 'mc', q: "KATSEYE is a girl group formed through a competition show by which label partnership?", options: ["Sony x BTS", "HYBE x Geffen", "Universal x YG", "Atlantic x Columbia"], correct: 1, explain: "HYBE (the Korean label behind BTS) and Geffen Records (American label). Formed through the show 'The Debut: Dream Academy' in 2023. Members from 6 different countries. Global pop pipeline." },
    { type: 'mc', q: "Billie Eilish's brother, who produces most of her music, is called…", options: ["Liam", "Finneas", "Jake", "Miles"], correct: 1, explain: "Finneas O'Connell. He's won loads of Grammys too. They recorded her first album in his childhood bedroom. Sibling creative pairs are severely underrated." },
    { type: 'mc', q: "Taylor Swift's re-recorded albums include '(Taylor's Version)' in the title because…", options: ["It sounds cool", "She's re-recording her early masters which she doesn't own", "Legal reasons only", "They sound different"], correct: 1, explain: "She's re-recording her early albums to own the masters. Her original masters were sold against her wishes. Re-recording means she owns these new versions. Genius music industry move, massive legal precedent." },
  ];

  // =============================================================
  // STATE
  // =============================================================
  const state = {
    brainCells: 0,
    streak: 0,
    lastVisit: null,
    seen: new Set(),
    runIndex: 0,
    runPool: [],
    runCorrect: 0,
    runAnswered: 0,
    currentMode: null,
    view: 'home'
  };

  async function loadState() {
    try {
      if (window.storage) {
        const b = await window.storage.get('sq_brain').catch(() => null);
        const s = await window.storage.get('sq_streak').catch(() => null);
        const lv = await window.storage.get('sq_lastvisit').catch(() => null);
        const seen = await window.storage.get('sq_seen').catch(() => null);
        if (b && b.value) state.brainCells = parseInt(b.value) || 0;
        if (s && s.value) state.streak = parseInt(s.value) || 0;
        if (lv && lv.value) state.lastVisit = lv.value;
        if (seen && seen.value) state.seen = new Set(JSON.parse(seen.value));
      }
    } catch (e) {}

    // Streak logic
    const today = new Date().toDateString();
    if (state.lastVisit !== today) {
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      if (state.lastVisit === yesterday) {
        state.streak += 1;
      } else if (state.lastVisit !== null) {
        state.streak = 1;
      } else {
        state.streak = 1;
      }
      state.lastVisit = today;
      await saveState();
    }
  }

  async function saveState() {
    try {
      if (window.storage) {
        await window.storage.set('sq_brain', String(state.brainCells));
        await window.storage.set('sq_streak', String(state.streak));
        await window.storage.set('sq_lastvisit', state.lastVisit || '');
        await window.storage.set('sq_seen', JSON.stringify([...state.seen]));
      }
    } catch (e) {}
  }

  function bumpBrain(amt, reason = '+1 brain cell') {
    state.brainCells += amt;
    saveState();
    updateStats();
    showToast(reason);
  }

  function updateStats() {
    const b = document.querySelector('.stat-brain');
    const s = document.querySelector('.stat-streak');
    if (b) b.textContent = state.brainCells;
    if (s) s.textContent = state.streak;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // =============================================================
  // RENDER
  // =============================================================
  const app = document.getElementById('app');

  function renderTopbar() {
    return `
    <div class="topbar">
      <div class="brand">
        <span>side quest</span>
        <span class="sub">v.01</span>
      </div>
      <div class="stats">
        <div class="stat-chip">
          <span class="num stat-brain">${state.brainCells}</span>
          <span class="label">brain cells</span>
        </div>
        <div class="stat-chip">
          <span class="num stat-streak">${state.streak}</span>
          <span class="label">day streak</span>
        </div>
      </div>
    </div>`;
  }

  function renderHome() {
    const today = new Date();
    const dailyIndex = Math.abs(hashDate(today)) % pool.length;
    const daily = pool[dailyIndex];
    const dailyDisplay = renderDailyPreview(daily);

    const streakMsg = state.streak === 1
      ? "day one. the rest is up to you."
      : state.streak <= 3
        ? `day ${state.streak}. no one's making you. that's the point.`
        : state.streak <= 7
          ? `day ${state.streak}. genuinely impressive tbh.`
          : `day ${state.streak}. you're basically running the place.`;

    return `
    ${renderTopbar()}
    <div class="hero">
      <div class="hero-eyebrow">// trivia · riddles · nothing serious</div>
      <h1>Side Quest<em>in your feed.</em><span class="dim">pull something</span></h1>
      <p class="hero-sub">${streakMsg}</p>
    </div>

    <div class="daily">
      <div class="daily-tag">
        <span class="daily-label">◈ daily pull</span>
        <span class="daily-date">${formatDate(today)}</span>
      </div>
      ${dailyDisplay}
    </div>

    <div class="section-label">◇ pick a mode · or don't</div>
    <div class="mode-grid">
      <div class="mode-card tint-rose" onclick="startMode('shuffle')">
        <div class="mode-icon">∽</div>
        <div>
          <div class="mode-title">Shuffle</div>
          <div class="mode-desc">10 random cards, any type. lowest effort, highest reward.</div>
        </div>
      </div>
      <div class="mode-card tint-accent" onclick="startMode('factcap')">
        <div class="mode-icon">?</div>
        <div>
          <div class="mode-title">Fact or Cap</div>
          <div class="mode-desc">true or false, told you nothing else</div>
        </div>
      </div>
      <div class="mode-card tint-gold" onclick="startMode('riddle')">
        <div class="mode-icon">§</div>
        <div>
          <div class="mode-title">Riddle Run</div>
          <div class="mode-desc">classic brain teasers. no pressure.</div>
        </div>
      </div>
      <div class="mode-card tint-coral" onclick="startMode('wyr')">
        <div class="mode-icon">∥</div>
        <div>
          <div class="mode-title">Would You Rather</div>
          <div class="mode-desc">no wrong answers. only chaos.</div>
        </div>
      </div>
      <div class="mode-card tint-mint" onclick="startMode('mystery')">
        <div class="mode-icon">✦</div>
        <div>
          <div class="mode-title">Mystery Drop</div>
          <div class="mode-desc">wild facts that sound made up but aren't</div>
        </div>
      </div>
      <div class="mode-card tint-sky" onclick="startMode('mc')">
        <div class="mode-icon">◎</div>
        <div>
          <div class="mode-title">Quick Pick</div>
          <div class="mode-desc">multiple choice trivia. fast rounds.</div>
        </div>
      </div>
    </div>

    <div class="footer-note">◈ save is automatic · skip anything you want</div>`;
  }

  function renderDailyPreview(item) {
    if (item.type === 'riddle') {
      return `
        <div class="daily-text">${escapeHtml(item.q)}</div>
        <div class="daily-reveal" id="dailyReveal"><strong>take a guess:</strong> ${escapeHtml(item.a)}</div>
        <button class="daily-btn" onclick="revealDaily()">reveal</button>
      `;
    }
    if (item.type === 'mystery') {
      return `
        <div class="daily-text">${escapeHtml(item.text)}</div>
        <div class="daily-reveal" id="dailyReveal">${escapeHtml(item.reveal)}</div>
        <button class="daily-btn" onclick="revealDaily()">tell me more</button>
      `;
    }
    if (item.type === 'factcap') {
      return `
        <div class="daily-text">${escapeHtml(item.text)}</div>
        <div class="daily-reveal" id="dailyReveal"><strong>${item.answer ? 'fact.' : 'cap.'}</strong> ${escapeHtml(item.explain)}</div>
        <button class="daily-btn" onclick="revealDaily()">verdict</button>
      `;
    }
    if (item.type === 'mc') {
      return `
        <div class="daily-text">${escapeHtml(item.q)}</div>
        <div class="daily-reveal" id="dailyReveal"><strong>${escapeHtml(item.options[item.correct])}.</strong> ${escapeHtml(item.explain)}</div>
        <button class="daily-btn" onclick="revealDaily()">reveal</button>
      `;
    }
    if (item.type === 'wyr') {
      return `
        <div class="daily-text">would you rather...<br>${escapeHtml(item.a)}<br>or<br>${escapeHtml(item.b)}?</div>
        <div class="daily-reveal" id="dailyReveal">${escapeHtml(item.context)}</div>
        <button class="daily-btn" onclick="revealDaily()">context</button>
      `;
    }
    return '';
  }

  window.revealDaily = function() {
    const r = document.getElementById('dailyReveal');
    const btn = document.querySelector('.daily-btn');
    if (r && !r.classList.contains('show')) {
      r.classList.add('show');
      if (btn) btn.textContent = 'close';
      bumpBrain(1, 'daily ✓');
    } else if (r) {
      r.classList.remove('show');
      if (btn) btn.textContent = 'reveal';
    }
  };

  // =============================================================
  // GAME MODES
  // =============================================================
  window.startMode = function(modeType) {
    state.currentMode = modeType;
    state.runCorrect = 0;
    state.runAnswered = 0;
    state.runIndex = 0;

    if (modeType === 'shuffle') {
      state.runPool = shuffle([...pool]).slice(0, 10);
    } else if (modeType === 'mc') {
      state.runPool = shuffle(pool.filter(p => p.type === 'mc')).slice(0, 8);
    } else {
      state.runPool = shuffle(pool.filter(p => p.type === modeType)).slice(0, 8);
    }

    state.view = 'game';
    renderGame();
  };

  function renderGame() {
    if (state.runIndex >= state.runPool.length) {
      renderWrapUp();
      return;
    }
    const item = state.runPool[state.runIndex];
    const progress = ((state.runIndex) / state.runPool.length) * 100;

    const card = renderCard(item);

    app.innerHTML = `
    ${renderTopbar()}
    <div class="game-view">
      <div class="game-header">
        <button class="back-btn" onclick="goHome()">← exit</button>
        <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
      </div>
      ${card}
    </div>`;
  }

  function renderCard(item) {
    const tag = cardTag(item.type);
    if (item.type === 'riddle') {
      return `
      <div class="card card-swap">
        <div>
          <div class="card-tag">${tag}</div>
          <div class="card-q">${escapeHtml(item.q)}</div>
        </div>
        <div class="reveal" id="reveal"><span class="vibe-check">the answer</span>${escapeHtml(item.a)}</div>
        <div class="next-bar">
          <button class="skip-btn" onclick="skipCard()">skip →</button>
          <button class="next-btn" id="revealBtn" onclick="revealAndNext()">reveal</button>
        </div>
      </div>`;
    }

    if (item.type === 'mystery') {
      return `
      <div class="card card-swap">
        <div>
          <div class="card-tag">${tag}</div>
          <div class="card-q">${escapeHtml(item.text)}</div>
        </div>
        <div class="reveal" id="reveal"><span class="vibe-check">the lore</span>${escapeHtml(item.reveal)}</div>
        <div class="next-bar">
          <button class="skip-btn" onclick="skipCard()">skip →</button>
          <button class="next-btn" id="revealBtn" onclick="revealAndNext()">tell me more</button>
        </div>
      </div>`;
    }

    if (item.type === 'factcap') {
      return `
      <div class="card card-swap">
        <div>
          <div class="card-tag">${tag}</div>
          <div class="card-q">${escapeHtml(item.text)}</div>
        </div>
        <div class="card-actions">
          <button class="action-btn" onclick="answerFC(true, ${item.answer})">fact</button>
          <button class="action-btn" onclick="answerFC(false, ${item.answer})">cap</button>
        </div>
        <div class="reveal" id="reveal"></div>
        <div class="next-bar" id="nextBar" style="display:none">
          <button class="skip-btn" onclick="skipCard()">end run</button>
          <button class="next-btn" onclick="nextCard()">next →</button>
        </div>
      </div>`;
    }

    if (item.type === 'wyr') {
      return `
      <div class="card card-swap">
        <div>
          <div class="card-tag">${tag}</div>
          <div class="card-q"><em>would you rather...</em></div>
        </div>
        <div class="wyr-wrap">
          <div class="wyr-opts">
            <button class="action-btn" onclick="answerWYR('a')">${escapeHtml(item.a)}</button>
            <button class="action-btn" onclick="answerWYR('b')">${escapeHtml(item.b)}</button>
          </div>
          <div class="wyr-or">or</div>
        </div>
        <div class="reveal" id="reveal"><span class="vibe-check">for context</span>${escapeHtml(item.context)}</div>
        <div class="next-bar" id="nextBar" style="display:none">
          <button class="skip-btn" onclick="skipCard()">end run</button>
          <button class="next-btn" onclick="nextCard()">next →</button>
        </div>
      </div>`;
    }

    if (item.type === 'mc') {
      const opts = item.options.map((o, i) =>
        `<button class="action-btn" onclick="answerMC(${i}, ${item.correct})">${escapeHtml(o)}</button>`
      ).join('');
      return `
      <div class="card card-swap">
        <div>
          <div class="card-tag">${tag}</div>
          <div class="card-q">${escapeHtml(item.q)}</div>
        </div>
        <div class="card-actions" style="flex-direction: column; align-items: stretch;">
          ${opts}
        </div>
        <div class="reveal" id="reveal"></div>
        <div class="next-bar" id="nextBar" style="display:none">
          <button class="skip-btn" onclick="skipCard()">end run</button>
          <button class="next-btn" onclick="nextCard()">next →</button>
        </div>
      </div>`;
    }
    return '';
  }

  function cardTag(type) {
    switch (type) {
      case 'riddle': return '◈ RIDDLE';
      case 'mystery': return '✦ MYSTERY DROP';
      case 'factcap': return '? FACT OR CAP';
      case 'wyr': return '∥ WOULD YOU RATHER';
      case 'mc': return '◎ QUICK PICK';
      default: return '';
    }
  }

  window.revealAndNext = function() {
    const btn = document.getElementById('revealBtn');
    const rev = document.getElementById('reveal');
    if (btn.textContent === 'reveal' || btn.textContent === 'tell me more') {
      rev.classList.add('show');
      btn.textContent = 'next →';
      bumpBrain(1, '+1 brain cell');
    } else {
      nextCard();
    }
  };

  window.answerFC = function(chose, correct) {
    const btns = document.querySelectorAll('.card-actions .action-btn');
    btns.forEach(b => b.disabled = true);
    btns.forEach(b => {
      const isFact = b.textContent.trim() === 'fact';
      const isThisCorrect = (isFact === correct);
      if (isThisCorrect) b.classList.add('right');
      else if ((chose && isFact) || (!chose && !isFact)) b.classList.add('wrong');
    });

    const item = state.runPool[state.runIndex];
    const rev = document.getElementById('reveal');
    const gotIt = (chose === correct);
    rev.innerHTML = `<span class="vibe-check">${gotIt ? 'called it' : 'the truth is'}</span><strong>${correct ? 'fact.' : 'cap.'}</strong> ${escapeHtml(item.explain)}`;
    rev.classList.add('show');
    document.getElementById('nextBar').style.display = 'flex';

    state.runAnswered++;
    if (gotIt) {
      state.runCorrect++;
      bumpBrain(2, '+2 brain cells');
    } else {
      bumpBrain(1, '+1 brain cell');
    }
  };

  window.answerMC = function(chosen, correct) {
    const btns = document.querySelectorAll('.card-actions .action-btn');
    btns.forEach((b, i) => {
      b.disabled = true;
      if (i === correct) b.classList.add('right');
      else if (i === chosen) b.classList.add('wrong');
    });

    const item = state.runPool[state.runIndex];
    const rev = document.getElementById('reveal');
    const gotIt = (chosen === correct);
    rev.innerHTML = `<span class="vibe-check">${gotIt ? 'lock in' : 'the answer is'}</span><strong>${escapeHtml(item.options[correct])}.</strong> ${escapeHtml(item.explain)}`;
    rev.classList.add('show');
    document.getElementById('nextBar').style.display = 'flex';

    state.runAnswered++;
    if (gotIt) {
      state.runCorrect++;
      bumpBrain(2, '+2 brain cells');
    } else {
      bumpBrain(1, '+1 brain cell');
    }
  };

  window.answerWYR = function(choice) {
    const btns = document.querySelectorAll('.wyr-opts .action-btn');
    btns.forEach((b, i) => {
      b.disabled = true;
      if ((choice === 'a' && i === 0) || (choice === 'b' && i === 1)) b.classList.add('picked');
    });
    const rev = document.getElementById('reveal');
    rev.classList.add('show');
    document.getElementById('nextBar').style.display = 'flex';
    state.runAnswered++;
    bumpBrain(1, '+1 brain cell');
  };

  window.nextCard = function() {
    state.runIndex++;
    renderGame();
  };

  window.skipCard = function() {
    state.runIndex++;
    renderGame();
  };

  function renderWrapUp() {
    const msg = wrapUpMessage();
    app.innerHTML = `
    ${renderTopbar()}
    <div class="game-view">
      <div class="wrap-up">
        <div class="eyebrow">◈ run complete</div>
        <h2>${msg.title}</h2>
        <div class="wrap-up-stats">
          <div class="wrap-stat">
            <div class="num">${state.runAnswered}</div>
            <div class="lbl">cards seen</div>
          </div>
          <div class="wrap-stat">
            <div class="num">${state.runCorrect}</div>
            <div class="lbl">nailed it</div>
          </div>
          <div class="wrap-stat">
            <div class="num">${state.brainCells}</div>
            <div class="lbl">total brain cells</div>
          </div>
        </div>
        <div class="wrap-up-note">${msg.note}</div>
        <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
          <button class="back-btn" onclick="startMode('${state.currentMode}')">↻ another run</button>
          <button class="next-btn" onclick="goHome()">back to home →</button>
        </div>
      </div>
    </div>`;
  }

  function wrapUpMessage() {
    const rate = state.runAnswered > 0 ? state.runCorrect / state.runAnswered : 0;
    if (state.runAnswered === 0) {
      return { title: "no pressure, no worries", note: "you explored, you left. it still counted. come back whenever." };
    }
    if (rate >= 0.8) {
      return { title: "actually unreal", note: `${state.runCorrect} out of ${state.runAnswered}. brain is ON. this might become a personality trait.` };
    }
    if (rate >= 0.5) {
      return { title: "solid run", note: `${state.runCorrect} out of ${state.runAnswered} on point. the rest is just intel for next time.` };
    }
    if (state.runAnswered > 0) {
      return { title: "you showed up", note: "that's the only metric that actually matters. run it back if you want. or don't." };
    }
    return { title: "quick one", note: "see you next time, maybe." };
  }

  window.goHome = function() {
    state.view = 'home';
    app.innerHTML = renderHome();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // =============================================================
  // UTILS
  // =============================================================
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function hashDate(d) {
    const s = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return h;
  }

  function formatDate(d) {
    const opts = { day: 'numeric', month: 'short', year: 'numeric' };
    return d.toLocaleDateString('en-GB', opts).toLowerCase();
  }

  function escapeHtml(s) {
    if (typeof s !== 'string') return s;
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // =============================================================
  // INIT
  // =============================================================
  (async function init() {
    await loadState();
    app.innerHTML = renderHome();
  })();
</script>

</body>
</html>
